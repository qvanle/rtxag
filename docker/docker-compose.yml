services:
  postgres:
    build:
      context: ..
      dockerfile: codebase/database/postgres/Dockerfile
    container_name: rtxag-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ${HOME}/rotexai-runtime/rtxag/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    build:
      context: ..
      dockerfile: codebase/database/qdrant/Dockerfile
    container_name: rtxag-qdrant
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - ${HOME}/rotexai-runtime/rtxag/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:6333/healthz > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminapi:
    build:
      context: ..
      dockerfile: codebase/core/Dockerfile
    container_name: rtxag-adminapi
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ADMIN_API_DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ROTEXAI_ORM_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ADMIN_API_ADDR: :8080
    ports:
      - "${ADMIN_API_PORT}:8080"
    command: ["start"]
    restart: unless-stopped

  llmhub:
    build:
      context: ../codebase/llmhub
      dockerfile: docker/Dockerfile
    container_name: rtxag-llmhub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: ${LLMHUB_MODE}
      AES_ENCRYPTION_KEY: ${LLMHUB_AES_ENCRYPTION_KEY}
      ICON_URL_PREFIX: ${LLMHUB_HOST_URL}
      PROJECT_ID: ${LLMHUB_PROJECT_ID}
    ports:
      - "${LLMHUB_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health_check', timeout=5).read()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
